<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>WebAR Saturn (.glb)</title>
  
  <!-- 動作実績が最も安定している A-Frame 1.4.2 と MindAR を読み込み -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js" crossorigin="anonymous"></script>
  
  <script>
    // ローカルのY軸に対してゆっくり回転させるカスタムコンポーネント
    AFRAME.registerComponent('slow-rotate', {
      schema: { speed: { type: 'number', default: 0.5 } },
      tick: function (time, timeDelta) {
        if (!this.el) return;
        let currentRotation = this.el.getAttribute('rotation');
        if (currentRotation) {
          // 時間経過に合わせて滑らかにY軸（自転軸）を回転
          currentRotation.y += (this.data.speed * (timeDelta / 100));
          this.el.setAttribute('rotation', currentRotation);
        }
      }
    });
  </script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
    }

    /* カメラ映像と描画キャンバスを画面全体いっぱいに引き伸ばし、左寄りを防ぐ設定 */
    video, .a-canvas {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      object-fit: cover !important;
      z-index: -10 !important;
    }

    /* スキャン待ちの簡易案内画面 */
    #scanning-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 23, 42, 0.8);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 16px;
      z-index: 50;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    #scanning-overlay.hidden {
      opacity: 0;
    }
    .spinner {
      border: 3px solid rgba(255, 255, 255, 0.1);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border-left-color: #3b82f6;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- 案内オーバーレイUI -->
  <div id="scanning-overlay">
    <div class="spinner"></div>
    <div style="text-align: center; padding: 0 16px;">
      <p style="margin: 0 0 8px 0; font-weight: bold; color: #60a5fa;">Saturn AR</p>
      <p style="margin: 0; font-size: 13px; color: #cbd5e1;">「saturn.mind」をスキャンしてください</p>
    </div>
  </div>

  <!-- A-Frame ARシーン -->
  <a-scene 
    mindar-image="imageTargetSrc: ./saturn.mind; autoStart: true; maxTrack: 1;" 
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights: true" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <!-- GLBモデルの読み込みパスを saturn_planet.glb に修正 -->
      <a-asset-item id="saturnModel" src="./saturn_planet.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- 環境光と平行光でモデルを明るく照らす -->
    <a-entity light="type: ambient; color: #ffffff; intensity: 1.5"></a-entity>
    <a-entity light="type: directional; color: #ffffff; intensity: 1.2" position="1 3 2"></a-entity>

    <!-- ARマーカーターゲット -->
    <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
      
      <!-- 
        【頭を上に向けるための回転アライメント】
        手前を向いている頭（Z軸方向）を、奥に90度倒して上（Y軸方向）に向けます。
        X軸を -90 度回転させることで、奥方向へ綺麗に倒れます。
      -->
      <a-entity rotation="-90 0 0">
        
        <!-- 
          【実際のモデルデータ】
          スケールを「最小（0.01）」に固定。
          slow-rotate（自転コンポーネント）によって、傾いた軸に対して綺麗に水平回転します。
        -->
        <a-gltf-model 
          id="saturn-mesh"
          src="#saturnModel" 
          scale="0.001 0.001 0.001" 
          position="0 0 0"
          slow-rotate="speed: 0.5">
        </a-gltf-model>
        
      </a-entity>
      
    </a-entity>

  </a-scene>

  <script>
    const targetEl = document.querySelector('#ar-target');
    const overlay = document.querySelector('#scanning-overlay');

    // マーカー検出時にスキャン案内を非表示にする
    targetEl.addEventListener("targetFound", () => {
      overlay.classList.add('hidden');
    });
    
    // マーカーを見失った時にスキャン案内を再表示する
    targetEl.addEventListener("targetLost", () => {
      overlay.classList.remove('hidden');
    });
  </script>

</body>
</html>
