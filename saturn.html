<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindAR Saturn WebAR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
    </style>
    <script>
        AFRAME.registerComponent('swipe-rotate', {
            schema: { speed: { default: 0.5 } },
            init: function () {
                this.isDragging = false;
                this.previousPosition = { x: 0, y: 0 };
                
                const onDragStart = (e) => {
                    this.isDragging = true;
                    this.previousPosition = {
                        x: e.touches ? e.touches[0].screenX : e.screenX,
                        y: e.touches ? e.touches[0].screenY : e.screenY
                    };
                };
                
                const onDragEnd = () => {
                    this.isDragging = false;
                };
                
                const onDragMove = (e) => {
                    if (!this.isDragging) return;
                    
                    const currentPosition = {
                        x: e.touches ? e.touches[0].screenX : e.screenX,
                        y: e.touches ? e.touches[0].screenY : e.screenY
                    };
                    
                    const deltaX = currentPosition.x - this.previousPosition.x;
                    const deltaY = currentPosition.y - this.previousPosition.y;
                    
                    let rot = this.el.getAttribute('rotation');
                    
                    this.el.setAttribute('rotation', {
                        x: rot.x - (deltaY * this.data.speed),
                        y: rot.y,
                        z: rot.z + (deltaX * this.data.speed)
                    });
                    
                    this.previousPosition = currentPosition;
                };

                this.el.sceneEl.addEventListener('loaded', () => {
                    const canvas = this.el.sceneEl.canvas;
                    canvas.addEventListener('mousedown', onDragStart);
                    canvas.addEventListener('mouseup', onDragEnd);
                    canvas.addEventListener('mouseleave', onDragEnd);
                    canvas.addEventListener('mousemove', onDragMove);
                    canvas.addEventListener('touchstart', onDragStart);
                    canvas.addEventListener('touchend', onDragEnd);
                    canvas.addEventListener('touchmove', onDragMove);
                });
            }
        });
    </script>
</head>
<body>

    <a-scene mindar-image="imageTargetSrc: ./saturn.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: yes;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights: true" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="saturnModel" src="./saturn_planet.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <!-- 
              サイズを 0.002 で固定
              机の上のマーカーに対して頭頂部が上を向く角度（X軸-90度）を維持してゆっくり回転
            -->
            <a-gltf-model id="model"
                          src="#saturnModel" 
                          position="0 0 0" 
                          scale="0.001 0.001 0.001"
                          rotation="90 0 0"
                          swipe-rotate>
            </a-gltf-model>
        </a-entity>

    </a-scene>

</body>
</html>
