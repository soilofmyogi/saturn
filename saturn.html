<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindAR Saturn WebAR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        /* サイズ切り替え用UIのスタイル */
        .ui-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 10px;
        }
        .size-btn {
            padding: 12px 24px;
            font-size: 16px;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            border: 2px solid white;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .size-btn:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>

    <!-- UIボタン -->
    <div class="ui-container">
        <button class="size-btn" onclick="changeScale('0.01 0.01 0.01')">サイズ: 0.01</button>
        <button class="size-btn" onclick="changeScale('0.1 0.1 0.1')">サイズ: 0.1</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./saturn.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: yes;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights: true" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="saturnModel" src="./saturn_planet.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <!-- 
              机の上のマーカーに対して頭頂部が上を向くよう、初期回転を X軸に-90度（奥へ倒す）設定。
              回転アニメーションは、この状態を維持したまま上空から見た時に時計回りにゆっくり回るよう設定。
            -->
            <a-gltf-model id="model"
                          src="#saturnModel" 
                          position="0 0 0" 
                          scale="0.1 0.1 0.1"
                          rotation="-90 0 0"
                          animation="property: rotation; from: -90 0 0; to: -90 360 0; dur: 20000; easing: linear; loop: true">
            </a-gltf-model>
        </a-entity>

    </a-scene>

    <script>
        // スケールを動的に変更する関数
        function changeScale(scaleStr) {
            const model = document.getElementById('model');
            if (model) {
                model.setAttribute('scale', scaleStr);
            }
        }
    </script>

</body>
</html>
