<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindAR Saturn WebAR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
    </style>
</head>
<body>

    <a-scene mindar-image="imageTargetSrc: ./saturn.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: yes;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights: true" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="saturnModel" src="./saturn_planet.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <!-- 
              サイズを 0.002 で固定
              机の上のマーカーに対して頭頂部が上を向く角度（X軸-90度）を維持してゆっくり回転
            -->
            <a-gltf-model id="model"
                          src="#saturnModel" 
                          position="0 0 0" 
                          scale="0.001 0.001 0.001"
                          rotation="0 0 0"
                          animation="property: rotation; from: 0 0 0; to: 0 360 0; dur: 20000; easing: linear; loop: true">
            </a-gltf-model>
        </a-entity>

    </a-scene>

</body>
</html>
