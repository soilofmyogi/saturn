<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindAR Saturn WebAR</title>
    <!-- A-Frame と MindAR のライブラリを読み込み -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
    </style>
</head>
<body>

    <!-- 
      mindar-image に作成した「saturn.mind」を指定
      autoStart: true で自動起動
    -->
    <a-scene mindar-image="imageTargetSrc: ./saturn.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: yes;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights: true" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <!-- 3Dモデル（saturn_planet.glb）をアセットとして登録 -->
            <a-asset-item id="saturnModel" src="./saturn_planet.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- 
          targetIndex: 0 (最初の画像ターゲットに紐付け)
          animation で Y軸を中心に360度、20秒（20000ミリ秒）かけて無限にゆっくり回転させる設定
        -->
        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model src="#saturnModel" 
                          position="0 0 0" 
                          scale="1 1 1"
                          animation="property: rotation; to: 0 360 0; dur: 20000; easing: linear; loop: true">
            </a-gltf-model>
        </a-entity>

    </a-scene>

</body>
</html>
