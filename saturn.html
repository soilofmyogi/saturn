<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Saturn AR</title>
    <!-- A-FrameとMindARの読み込み -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script>
      // ゆっくり回転するコンポーネント
      AFRAME.registerComponent('slow-rotate', {
        tick: function (time, timeDelta) {
          if (!this.el) return;
          const currentRot = this.el.getAttribute('rotation');
          this.el.setAttribute('rotation', {
            x: currentRot.x,
            y: currentRot.y + (1.0 * timeDelta / 100),
            z: currentRot.z
          });
        }
      });
    </script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <!-- ARシーン -->
    <a-scene 
      mindar-image="imageTargetSrc: ./saturn.mind; autoStart: true;" 
      color-space="sRGB" 
      renderer="colorManagement: true;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <!-- 3Dモデルの読み込み -->
        <a-asset-item id="saturn" src="./saturn_planet.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- 光源（モデルを明るく見せるため） -->
      <a-entity light="type: ambient; color: #FFF; intensity: 1.5"></a-entity>
      <a-entity light="type: directional; color: #FFF; intensity: 1.0" position="-1 2 1"></a-entity>

      <!-- マーカーを検知するターゲット -->
      <a-entity mindar-image-target="targetIndex: 0">
        <!-- 
          モデルを表示し、ゆっくり回転させる。
          ※表示されない場合は、このscale="0.05 0.05 0.05" を 0.001 や 1.0 などに変更してみてください。
        -->
        <a-gltf-model 
          src="#saturn" 
          position="0 0 0" 
          scale="0.05 0.05 0.05" 
          rotation="0 0 0"
          slow-rotate>
        </a-gltf-model>
      </a-entity>
      
    </a-scene>
  </body>
</html>
